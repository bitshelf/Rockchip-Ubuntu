# ==========================================================================
# Board Configuration: Rockchip RK3576 (Rockchip RK3576)
#
# This file contains all board-specific hardcoded values.
# To add a new board, copy this file and modify the values.
# All build scripts source this config and reference variables only.
# ==========================================================================

# --- Board Identification ---
BOARD_NAME="rk3576"
BOARD_VENDOR="Rockchip"
BOARD_MODEL="RK3576"
SOC_FAMILY="rockchip"
SOC_MODEL="rk3576"

# --- Image Naming ---
IMAGE_HOSTNAME="rk3576"
IMAGE_DISPLAY_NAME="Ubuntu Server Rockchip RK3576"
IMAGE_NAME_PREFIX="ubuntu-server-rk3576"

# --- Bootloader (from SDK u-boot/) ---
# idbloader: SPL + DDR init binary, written to raw LBA 64
IDBLOADER_SOURCE="rk3576_spl_loader_v1.09.108.bin"
# u-boot: U-Boot FIT image (U-Boot proper + ATF BL31 + OP-TEE)
UBOOT_SOURCE="uboot.img"
# Kernel FIT image (from SDK kernel build)
BOOTIMG_SOURCE="boot.img"

# --- Device Tree ---
# Production board DTB (myd-lr3576j-gk with mipi-101c panel)
DTB_BASE="myd-lr3576j-gk.dtb"
# Production DTS file
DTS_FILE="myd-lr3576j-gk.dts"
# Overlay DTBO directory in kernel source
OVERLAY_SOURCE_DIR="arch/arm64/boot/dts/rockchip"
# Overlay glob pattern (no prebuilt overlays shipped yet)
OVERLAY_PATTERN="myd-lr3576-*-overlay.dtbo"

# --- Partition Layout (from rockdev/parameter.txt) ---
# All values in sectors (512 bytes/sector)
PART_BOOT_START=32768     # 0x8000
PART_BOOT_SIZE_MB=256
PART_ROOTFS_SIZE_MB=6144    # 6GB (server); overridden below for desktop
PART_OVERLAY_SIZE_MB=512    # 512MB (server)
DISK_SIZE_MB=8192           # 8GB total (server)

# Desktop variant needs more space
if [[ "${UBUNTU_VARIANT:-desktop}" == "desktop" ]]; then
    PART_ROOTFS_SIZE_MB=12288   # 12GB
    PART_OVERLAY_SIZE_MB=1024   # 1GB
    DISK_SIZE_MB=14336          # 14GB
fi

# Raw bootloader sector offsets
LBA_IDBLOADER=64          # 0x40
LBA_UBOOT=16384           # 0x4000

# --- Packaging ---
# Method: "mkupdate" (Rockchip update.img via afptool+rkImageMaker)
#         "gpt"       (raw GPT disk image via sgdisk)
PACKAGE_METHOD="mkupdate"

# Partitions to include in update.img (space-separated)
# Comment out partitions you don't need (e.g., userdata for embedded use)
UPDATE_PARTITIONS="uboot misc boot recovery backup rootfs oem"

# --- Rootfs OverlayFS ---
# "yes" — read-only rootfs + overlay partition (factory reset safe)
# "no"  — plain writable rootfs (simpler, no factory reset)
ROOTFS_OVERLAY_ENABLE="${ROOTFS_OVERLAY_ENABLE:-yes}"

# U-Boot environment (fw_printenv / fw_setenv)
# Offsets read from u-boot/.config; overridable here
UBOOT_ENV_DEV="${UBOOT_ENV_DEV:-/dev/mmcblk0}"
UBOOT_ENV_OFFSET="${UBOOT_ENV_OFFSET:-0x3f8000}"
UBOOT_ENV_SIZE="${UBOOT_ENV_SIZE:-0x8000}"

# --- Debug Overlay ---
# Set to "yes" to include debug/test tools; "no" for release builds
OVERLAY_DEBUG_ENABLE="${OVERLAY_DEBUG_ENABLE:-no}"

# --- Overlays (merged: base + local) ---
# Each entry:  BASE_DIR|LOCAL_DIR
# Merge: copy BASE first, then LOCAL on top (local overwrites base)
# Missing BASE dirs are skipped silently
OVERLAYS=(
    "${SDK_PATH}/debian/overlay|${PROJECT_DIR}/overlay/overlay"
    "${SDK_PATH}/debian/overlay-firmware|${PROJECT_DIR}/overlay/overlay-firmware"
)

# Conditionally add debug overlay
if [[ "${OVERLAY_DEBUG_ENABLE}" == "yes" ]]; then
    OVERLAYS+=( "${SDK_PATH}/debian/overlay-debug|${PROJECT_DIR}/overlay/overlay-debug" )
fi

# --- Partition Labels ---
BOOT_LABEL="boot"
ROOTFS_LABEL="rootfs"
OVERLAY_LABEL="overlay"

# --- Serial Console ---
# Rockchip uses FIQ debugger UART as primary console
SERIAL_CONSOLE_DEV="ttyFIQ0"
SERIAL_CONSOLE_BAUD="1500000"
SERIAL_CONSOLE_PARAMS="earlycon=uart8250,mmio32,0x2a340000 console=ttyFIQ0,1500000n8"

# --- Kernel ---
KERNEL_SOURCE_DIR="kernel-6.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_CFG_FRAGMENTS="rk3576.config rockchip_linux_docker.config"
KERNEL_VERSION="6.1.118"
KERNEL_BOOT_TYPE="fit"     # FIT image (U-Boot bootm)

# --- Rockchip GPU ---
MALI_GPU_VARIANT="g31"     # RK3576 uses Mali-G31

# --- Kernel Modules to include in rootfs ---
# In-tree modules: list of .ko paths relative to kernel build dir
#   Copied from kernel-6.1/ into rootfs. Empty = skip.
#   Example: drivers/net/wireless/rockchip_wlan/rkwifi/bcmdhd/bcmdhd.ko
KERNEL_MODULES_LIST=(
    # "drivers/some/module.ko"
)

# --- External Kernel Modules (built from source) ---
# Which wifi/BT modules to compile from external/rkwifibt/
#   bcmdhd_pcie  — Broadcom PCIe (AP6275P, MYD-LR3576 default)
#   bcmdhd_sdio  — Broadcom SDIO (AP6212, AP6256 etc.)
#   bcmdhd       — both PCIe + SDIO
#   realtek      — Realtek rtl8xxx series
#   all          — everything
WIFIBT_MODULES="bcmdhd_pcie"

# --- Source URIs (Yocto-style SRC_URI) ---
# Each source can be: file://path, https://url, git://url
# Build system checks local first, then fetches from URI

# U-Boot source (SDK local repo, no clone needed)
UBOOT_URI="file://${SDK_PATH}/u-boot"
UBOOT_SRCREV=""
# U-Boot build requires rkbin path for DDR init + BL31+OP-TEE:
#   ROCKCHIP_TPL=rkbin/bin/rk35/rk3576_ddr_*.bin
#   BL31=rkbin/bin/rk35/rk3576_bl31_*.elf
#   TEE=rkbin/bin/rk35/rk3576_bl32_*.bin (OP-TEE)

# Kernel source (SDK local repo, no clone needed)
KERNEL_URI="file://${SDK_PATH}/kernel-6.1"
KERNEL_SRCREV=""

# Rockchip binary blobs (DDR init, ATF, OP-TEE)
RKBIN_URI="https://github.com/rockchip-linux/rkbin"
RKBIN_SRCREV="master"

# SDK output directory (pre-built artifacts)
SDK_OUTPUT_DIR="output/firmware"
SDK_EXTERNAL_DIR="external"
SDK_PARAMETER_FILE="rockdev/parameter.txt"

# Cross-compiler toolchain
TOOLCHAIN_URI="file:///media/loh/rockchip/lr3576_v2/prebuilts/gcc"
TOOLCHAIN_PREFIX="aarch64-linux-gnu-"

# --- Ubuntu Image Definition ---
UBUNTU_SERIES_DEFAULT="noble"
UBUNTU_SEEDS="server minimal standard"
# Image variant: "server" (default) or "desktop" (GNOME)
UBUNTU_VARIANT="${UBUNTU_VARIANT:-desktop}"
UBUNTU_CLASS="preinstalled"
UBUNTU_ARCH="arm64"

# --- Default User ---
DEFAULT_USER="ubuntu"
DEFAULT_PASSWORD="ubuntu"

# --- Extra kernel modules to load at boot ---
KERNEL_MODULES=(
    rockchipdrm
    rockchip_saradc
    rockchip_thermal
    rk_vcodec
    rga2
    mpp_vcodec
)

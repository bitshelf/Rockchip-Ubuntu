# Package check lists for image verification
# Each list is checked against the installed rootfs; non-empty matches produce warnings.
# Used by build.sh verify_image() — no chroot needed.

# Packages that should NOT be in the image (embedded/server should be lean)
UNWANTED_PACKAGES=(
    gnome-games
    gnome-sudoku
    gnome-mines
    gnome-mahjongg
    aisleriot
    thunderbird
    transmission-gtk
    rhythmbox
)

# Background services that should NOT run on embedded devices
UNWANTED_SERVICES=(
    unattended-upgrades
    update-notifier
    update-notifier-common
    update-manager-core
    ubuntu-release-upgrader-core
)

# Packages that MUST be present (basic sanity check)
REQUIRED_PACKAGES=(
    systemd
    apt
    bash
    ubuntu-keyring
)
